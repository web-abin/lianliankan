<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capybara Water Animation</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000; /* Matching background */
            margin: 0;
        }

        .capybara-animation {
            /* IMPORTANT: 
               These dimensions are for *one single frame*.
               Since there are 12 frames in total, the original image (which is 1616x113) 
               is divided by 12: 1616 / 12 = 134.66.
               We'll use 135px as an approximation for the width.
            */
            width: 135px; 
            height: 140px; /* Full height of the image */

            /* Link to your sprite image */
            background-image: url('xulie.png');
            background-size: auto 140px;
            background-repeat: no-repeat;
            
            /* Start with the first frame visible */
            background-position: 0px 0px;

            /* Create the animation.
               'capybara-wash' is the name defined below.
               '1.2s' is the duration for one complete cycle.
               'steps(12)' is the key: it jumps frame-by-frame instead of a smooth slide.
               'infinite' makes it loop forever.
            */
            animation: capybara-wash 1.2s steps(12) infinite;

        }

        /* 精准逐帧雪碧动画：最后帧应只偏移 11 格（第0帧到第11帧），不应是12格 */
        @keyframes capybara-wash {
            from {
                background-position:    0px 0px;
            }
            to {
                /* 只移动 11 个帧宽 */
                background-position: -1485px 0px; /* 135px × 11 = 1485px */
            }
        }
    </style>
</head>
<body>
    <div class="capybara-animation"></div>
</body>
</html>
